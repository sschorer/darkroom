name: PR Title

# We squash-merge, so the PR title becomes the commit message on main.
# That makes this — not a local git hook — the only enforcement point that
# actually works for outside contributors. See ADR-011.
#
# `pull_request_target` is correct here: we read only the title from the event
# payload and never check out or execute PR code.

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read
  statuses: write

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Conventional Commit format
    runs-on: ubuntu-24.04
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with commitlint.config.mjs.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          scopes: |
            registry
            engine
            sidecar
            download
            updater
            comfy
            ui
            paths
            vouch
            ci
            deps
          requireScope: false
          subjectPattern: ^(?![A-Z])(?!.*\.$).+$
          subjectPatternError: |
            The subject "{subject}" is invalid for the "{type}" type.
            It must start lowercase and must not end with a period.
          # Don't nag on drafts — CONTRIBUTING actively encourages them.
          ignoreLabels: |
            ignore-semantic-pull-request
