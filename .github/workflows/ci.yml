name: ci

# SECURITY: `pull_request`, never `pull_request_target`. This workflow checks
# out and executes PR code, so it must run in the fork's context with a
# read-only token and no secrets. pull_request_target here would be a repo
# takeover waiting to happen. Trust labelling lives in pr-vouch.yml.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fastest and highest-value job, so it runs first and alone. Catches the
  # #1 breakage class: a manifest whose node IDs don't match its workflow.
  # No Rust, no GPU, ~10 seconds.
  registry:
    name: Registry validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:registry

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # Symmetry with the rust job's `cargo fmt --check`. Without this,
      # formatting is enforced on one side of the app and not the other, and
      # `make check` would claim to mirror CI while being stricter than it.
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test:unit --coverage

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # paths.rs and the venv layout differ per OS. Testing only on Linux
        # means Windows path bugs ship to users.
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './native -> target'
          key: ${{ matrix.os }}
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2 file build-essential curl wget

      # Not just the bundle's problem: `externalBin` makes tauri-build fail at
      # compile time if the sidecar is absent, so clippy and test need it too.
      # No pnpm install here — the script is stdlib-only for exactly this reason.
      #
      # --verify runs `uv --version`. This matrix is the only place the sidecar
      # is exercised on all three OSes; without it, an extraction or startup
      # defect passes CI, because externalBin only checks that a file exists.
      - run: node scripts/fetch-uv.mjs --verify

      - run: cargo fmt --all --check
        working-directory: native
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: native
      - run: cargo test --all-features
        working-directory: native

      # Fail if the checked-in ts-rs mirror drifted from the Rust IPC types
      # (ADR-018). Delegated to the Makefile so this and local `make check` run
      # the identical gate — CLAUDE.md keeps command flags in the Makefile alone.
      # Linux only: one runner is enough to diff, and it sidesteps CRLF churn on
      # the Windows tree that the all-OS `cargo test` above would leave.
      - name: IPC bindings are in sync
        if: matrix.os == 'ubuntu-22.04'
        run: make bindings-check

  # Proves the thing still bundles. Unsigned, artifacts discarded.
  # Catches "works in dev, explodes in tauri build" before a release tag does.
  build:
    name: Bundle smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './native -> target'
          key: build-${{ matrix.os }}

      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libfuse2 file build-essential curl wget

      # Plain fetch: the rust matrix above already runs --verify on all three
      # OSes, and this job only needs the file present to bundle it.
      - run: node scripts/fetch-uv.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri build --no-bundle
        env:
          # Deliberately no signing key: an unsigned build must succeed, or
          # forks and contributors can't build the project at all.
          TAURI_SIGNING_PRIVATE_KEY: ""
